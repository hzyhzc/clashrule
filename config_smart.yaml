proxy-providers:
  JC:
    type: http
    interval: 86400
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: 300
    proxy: 🟢 直连
    url: "http://192.168.5.10:3001/2cXaAxRGfhzmGz2yx1wA/download/collection/JC?target=ClashMeta"

unified-delay: true
tcp-concurrent: true
global-client-fingerprint: chrome

proxies:
- name: "🟢 直连"
  type: direct
  udp: true

pr: &pr {type: select, proxies: [🚀 节点选择, 🔯 香港故转, 🔯 日本故转, 🔯 香港负载均衡, ♻️ 香港智能, ♻️ 狮城智能, ♻️ 日本智能, ♻️ 美国智能, ♻️ 智能选择, 🇭🇰 香港节点, 🇯🇵 日本节点, 🇺🇲 美国节点, 🇨🇳 台湾节点, 🇸🇬 狮城节点, 🇰🇷 韩国节点, Oracle节点, 🌐 全部节点, 🟢 直连]}

proxy-groups:
  - {name: 🚀 节点选择, type: select, proxies: [🔯 香港故转, 🔯 日本故转, 🔯 香港负载均衡, ♻️ 香港智能, ♻️ 狮城智能, ♻️ 日本智能, ♻️ 美国智能, ♻️ 智能选择, 🇭🇰 香港节点, 🇯🇵 日本节点, 🇺🇲 美国节点, 🇨🇳 台湾节点, 🇸🇬 狮城节点, 🇰🇷 韩国节点, Oracle节点, 🌐 全部节点, 🟢 直连]}
  - {name: 📹 YouTube, <<: *pr}
  - {name: 🍀 Google, <<: *pr}
  - {name: 🤖 ChatGPT, <<: *pr}
  - {name: 👨🏿‍💻 GitHub, <<: *pr}
  - {name: 🐬 OneDrive, <<: *pr}
  - {name: Ⓜ️ Microsoft, <<: *pr}
  - {name: 🎵 TikTok, <<: *pr}
  - {name: 📲 Telegram, <<: *pr}
  - {name: 📺 Twitter, <<: *pr}  
  - {name: 🎥 NETFLIX, <<: *pr}
  - {name: 📺 EMBY, <<: *pr}
  - {name: ✈️ Speedtest, <<: *pr}
  - {name: 💶 PayPal, <<: *pr}
  - {name: 🔗 GlobalDNS, <<: *pr}
  - {name: 🎮 游戏平台, <<: *pr}
  - {name: 🍎 Apple, type: select, proxies: [🟢 直连, 🚀 节点选择]}
  - {name: 🎯 全球直连, type: select, proxies: [🟢 直连, 🚀 节点选择]}
  - {name: 🐟 漏网之鱼, <<: *pr}
  - {name: 🇭🇰 香港节点, type: select, include-all: true, filter: "(?i)港|hk|hongkong|hong kong"}
  - {name: 🇯🇵 日本节点, type: select, include-all: true, filter: "(?i)日|jp|japan"}
  - {name: 🇺🇲 美国节点, type: select, include-all: true, filter: "(?i)美|us|unitedstates|united states"}
  - {name: 🇨🇳 台湾节点, type: select, include-all: true, filter: "台|新北|彰化|TW|Taiwan"}
  - {name: 🇸🇬 狮城节点, type: select, include-all: true, filter: "新加坡|坡|狮城|SG|Singapore"}
  - {name: 🇰🇷 韩国节点, type: select, include-all: true, filter: "KR|Korea|KOR|首尔|韩|韓"}
  - {name: Oracle节点, type: select, include-all: true, filter: "racle|hzyhzc"}
  - {name: 🔯 香港故转, type: fallback, include-all: true, tolerance: 20, interval: 300, filter: "(?=.*(港|HK|(?i)Hong))^((?!(台|日|韩|新|深|美)).)*$"}
  - {name: 🔯 日本故转, type: fallback, include-all: true, tolerance: 20, interval: 300, filter: "(?=.*(日|JP|(?i)Japan))^((?!(港|台|韩|新|美)).)*$" }
  - {name: 🔯 香港负载均衡, type: smart, uselightgbm: true, collectdata: false, include-all: true, interval: 300, filter: "^(?=.*(港|HK|hk|Hong Kong|HongKong|hongkong))(?:(?!标准|高级|家|0).)*$"}
  - {name: ♻️ 香港智能, type: smart, uselightgbm: true, collectdata: false, include-all: true, interval: 300, filter: "^(?=.*(港|HK|hk|Hong Kong|HongKong|hongkong))(?:(?!标准|高级|家).)*$"}
  - {name: ♻️ 狮城智能, type: smart, uselightgbm: true, collectdata: false, include-all: true, interval: 300, filter: "^(?=.*(新加坡|坡|狮城|SG|Singapore))(?:(?!标准|高级|家).)*$"}
  - {name: ♻️ 日本智能, type: smart, uselightgbm: true, collectdata: false, include-all: true, interval: 300, filter: "(?=.*(日|JP|(?i)Japan))^((?!(港|台|韩|新|美|标准|高级|家)).)*$" }
  - {name: ♻️ 美国智能, type: smart, uselightgbm: true, collectdata: false, include-all: true, interval: 300, filter: "(?=.*(美|US|(?i)States|America))^((?!(港|台|日|韩|新|标准|高级|家)).)*$"}
  - {name: ♻️ 智能选择, type: smart, uselightgbm: true, collectdata: false, include-all: true, interval: 300, filter: "^((?!(直连)).)*$"}
  - {name: 🌐 全部节点, type: select, include-all: true}
